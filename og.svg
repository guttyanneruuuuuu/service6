    </linearGradient>
    <radialGradient id="portal" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#7ce7ff"/>
      <stop offset="60%" stop-color="#b794ff"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(830,80)">
    <rect x="0" y="0" width="260" height="470" rx="130" fill="#10131d" stroke="#1f2636" stroke-width="2"/>
    <rect x="12" y="12" width="236" height="450" rx="118" fill="url(#portal)"/>
  </g>
  <g fill="#7ce7ff">
